<!DOCTYPE html>
<html>
<head>
    <title>For My Crush ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            overflow: hidden;
        }

        h1 {
            margin-top: 120px;
            font-size: 45px;
            color: white;
            transition: 0.5s;
        }

        button {
            padding: 12px 30px;
            font-size: 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: white;
            color: #ff4d6d;
            margin-top: 30px;
            transition: 0.3s;
        }

        button:hover {
            background: #ff4d6d;
            color: white;
        }

        /* Floating Hearts */
        .heart {
            position: absolute;
            bottom: -20px;
            font-size: 20px;
            animation: float 5s linear infinite;
            color: white;
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-800px); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1 id="text">Click Below 💖</h1>
    <button onclick="nextMessage()">Click Me</button>

    <script>
        let step = 0;
        function nextMessage() {
            if (step === 0) {
                document.getElementById("text").innerHTML = "Hii Crush 💕";
                step++;
            } else if (step === 1) {
                document.getElementById("text").innerHTML = "Miss korchilam crush tomak ❤️";
                step++;
            }
        }

        // Create floating hearts
        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 20 + 15 + "px";
            heart.style.animationDuration = Math.random() * 3 + 3 + "s";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        setInterval(createHeart, 500);
    </script>

</body>
</html>
